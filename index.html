<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axon Gestalt Photonic FPGA</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            user-select: none;
        }
        h1 { color: #58a6ff; margin-bottom: 5px; }
        .dashboard {
            display: flex;
            gap: 10px;
            background: #161b22;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #30363d;
            margin-bottom: 15px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 900px;
        }
        .tool-btn {
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
            transition: 0.1s;
        }
        .tool-btn.active { background: #58a6ff; color: #0d1117; }
        .tool-btn:hover:not(.active) { background: #30363d; }
        
        canvas {
            background: #000;
            border: 1px solid #30363d;
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.15);
            cursor: crosshair;
            image-rendering: pixelated;
        }
        .notes { text-align: center; margin-top: 10px; font-size: 0.9em; color: #8b949e; max-width: 800px; line-height: 1.4; }
    </style>
</head>
<body>

    <h1>Axon Gestalt: Array Simulator</h1>
    
    <div class="dashboard">
        <button class="tool-btn active" data-type="axon-h">➖ Horizontal Axon</button>
        <button class="tool-btn" data-type="axon-v">⏬ Vertical Axon</button>
        <button class="tool-btn" style="border-color: #2ea043;" data-type="and">✖️ AND Gate</button>
        <button class="tool-btn" style="border-color: #d2a8ff;" data-type="or">➕ OR Gate</button>
        <button class="tool-btn" style="border-color: #ff7b72;" data-type="nand">❌ NAND Gate</button>
        <button class="tool-btn" style="border-color: #a5d6ff;" data-type="nor">⭕ NOR Gate</button>
        <button class="tool-btn" style="border-color: #f0883e;" data-type="source">🔆 Source (1)</button>
        <button class="tool-btn" style="border-color: #484f58;" data-type="block">⬛ Block (-1)</button>
        <button id="clearBtn" class="tool-btn" style="margin-left: 10px;">Reset Array</button>
    </div>

    <canvas id="fpgaGrid" width="800" height="500"></canvas>

    <div class="notes">
        <p><strong>The Matrix is Live:</strong> Data pulses flow Right-to-Left. <em>Horizontal Axons</em> pass data leftward. <em>Vertical Axons</em> tap data downward. Combine them into <em>AND/OR</em> gates to synthesize complex macro-gates (XOR/XNOR). Neon blue is Passing Polarization (+1); Dark is Canceling (-1).</p>
    </div>

    <script>
        const canvas = document.getElementById('fpgaGrid');
        const ctx = canvas.getContext('2d');
        
        const COLS = 160;
        const ROWS = 100;
        const CELL_SIZE = canvas.width / COLS;
        
        // Brill Cell Parameters for the entire grid
        let wA = new Float32Array(COLS * ROWS); // Top Input Weight
        let wB = new Float32Array(COLS * ROWS); // Right Input Weight
        let theta = new Float32Array(COLS * ROWS); // Internal Bias
        let cellType = new Uint8Array(COLS * ROWS); // For rendering colors
        
        // Logical states (-1 or 1)
        let state = new Int8Array(COLS * ROWS).fill(-1);
        let nextState = new Int8Array(COLS * ROWS).fill(-1);
        
        let currentBrush = 'axon-h';
        let isDrawing = false;
        let tick = 0;

        // Gate Configurations [wA, wB, theta, render_type_id]
        const gates = {
            'axon-h': [0, 1, 0, 1],   // Pass Right (B)
            'axon-v': [1, 0, 0, 2],   // Pass Top (A)
            'and':    [1, 1, -1, 3],  // Threshold requires both
            'or':     [1, 1, 1, 4],   // Threshold requires either
            'nand':   [-1, -1, 1, 5], // Inverted AND
            'nor':    [-1, -1, -1, 6],// Inverted OR
            'source': [0, 0, 2, 7],   // Constant +1
            'block':  [0, 0, -2, 8]   // Constant -1
        };

        function initGrid() {
            // Fill with Horizontal Axons
            for (let i = 0; i < COLS * ROWS; i++) {
                wA[i] = gates['axon-h'][0];
                wB[i] = gates['axon-h'][1];
                theta[i] = gates['axon-h'][2];
                cellType[i] = gates['axon-h'][3];
            }
        }

        // UI Handlers
        document.querySelectorAll('.tool-btn[data-type]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentBrush = e.target.getAttribute('data-type');
            });
        });

        document.getElementById('clearBtn').addEventListener('click', initGrid);

        function paint(e) {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            // Paint a 2x2 brush for visibility
            const cx = Math.floor((e.clientX - rect.left) / CELL_SIZE);
            const cy = Math.floor((e.clientY - rect.top) / CELL_SIZE);
            
            for(let dx = 0; dx < 2; dx++) {
                for(let dy = 0; dy < 2; dy++) {
                    const x = cx + dx;
                    const y = cy + dy;
                    if (x >= 0 && x < COLS && y >= 0 && y < ROWS) {
                        const idx = y * COLS + x;
                        const config = gates[currentBrush];
                        wA[idx] = config[0];
                        wB[idx] = config[1];
                        theta[idx] = config[2];
                        cellType[idx] = config[3];
                    }
                }
            }
        }

        canvas.addEventListener('mousedown', (e) => { isDrawing = true; paint(e); });
        canvas.addEventListener('mousemove', paint);
        window.addEventListener('mouseup', () => { isDrawing = false; });

        function step() {
            tick++;
            
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    const idx = y * COLS + x;
                    
                    // Input A (Top). Boundary is blocking (-1)
                    let a = (y > 0) ? state[(y - 1) * COLS + x] : -1;
                    
                    // Input B (Right). 
                    let b = -1;
                    if (x < COLS - 1) {
                        b = state[y * COLS + (x + 1)];
                    } else {
                        // Right edge is the optical source array. Generate repeating data pulses.
                        if (y % 4 < 2) {
                            b = (Math.sin(tick / 5 + y) > 0) ? 1 : -1;
                        } else {
                            b = (Math.sin(tick / 10) > 0) ? 1 : -1;
                        }
                    }

                    // The Brill Equation: y = sgn(wA*a + wB*b + theta)
                    const H_n = (wA[idx] * a) + (wB[idx] * b) + theta[idx];
                    nextState[idx] = H_n >= 0 ? 1 : -1;
                }
            }

            // Swap buffers
            let temp = state;
            state = nextState;
            nextState = temp;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    const idx = y * COLS + x;
                    const val = state[idx];
                    const type = cellType[idx];

                    // Draw Hardware Underlay
                    let color = '#000';
                    switch(type) {
                        case 1: color = '#0d1117'; break; // H-Axon
                        case 2: color = '#161b22'; break; // V-Axon
                        case 3: color = '#1a3a22'; break; // AND
                        case 4: color = '#3a224a'; break; // OR
                        case 5: color = '#4a2222'; break; // NAND
                        case 6: color = '#223a4a'; break; // NOR
                        case 7: color = '#4a3812'; break; // Source
                        case 8: color = '#111'; break;    // Block
                    }
                    
                    ctx.fillStyle = color;
                    ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);

                    // Draw Signal Overlay
                    if (val === 1) {
                        ctx.fillStyle = (type === 1 || type === 2) ? '#58a6ff' : '#ffffff';
                        const pad = 1;
                        ctx.fillRect(x * CELL_SIZE + pad, y * CELL_SIZE + pad, CELL_SIZE - pad*2, CELL_SIZE - pad*2);
                    }
                }
            }
        }

        function loop() {
            step();
            draw();
            setTimeout(() => requestAnimationFrame(loop), 30); 
        }

        initGrid();
        loop();

    </script>
</body>
</html>
